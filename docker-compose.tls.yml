services:
  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - front
      - back
    ports:
      - "${AB_TLS_FRONTEND_PORT?set AB_TLS_FRONTEND_PORT}:443"
    volumes:
      - ./docker/nginx/nginx.https.conf:/etc/nginx/nginx.conf:ro
      - ${AB_TLS_CERT_MOUNT_SRC?set AB_TLS_CERT_MOUNT_SRC}:/run/ab-tls/server.crt:ro
      - ${AB_TLS_KEY_MOUNT_SRC?set AB_TLS_KEY_MOUNT_SRC}:/run/ab-tls/server.key:ro
