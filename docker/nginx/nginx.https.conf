worker_processes auto;

events {
  worker_connections 1024;
}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /run/ab-tls/server.crt;
    ssl_certificate_key /run/ab-tls/server.key;

    location /api/ {
      proxy_pass http://back:8420;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /ws/ {
      proxy_pass http://back:8420;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location / {
      proxy_pass http://front:5180;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  # mTLS-ENFORCED mirror of the :443 vhost above. Same upstreams, same
  # locations — the only differences are `ssl_verify_client on` (refuses any
  # connection without a valid client cert at TLS handshake) and the extra
  # X-SSL-* headers passed through to the back so /whoami can introspect.
  # When the "Require client cert" setting is on, the front redirects users
  # from :5443 to :5444; everything (UI, /api, /ws) is then cert-gated.
  # :5443 stays open as a recovery / setup channel.
  server {
    listen 5444 ssl;
    server_name _;

    ssl_certificate /run/ab-tls/server.crt;
    ssl_certificate_key /run/ab-tls/server.key;
    ssl_client_certificate /run/ab-tls/browser-ca.crt;
    ssl_verify_client on;
    ssl_verify_depth 2;

    # Docker's embedded DNS — resolves `back` at request-time so nginx doesn't
    # die at startup if the back container isn't named yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
      set $back_upstream "back:8420";
      proxy_pass http://$back_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-SSL-Verify $ssl_client_verify;
      proxy_set_header X-SSL-Subject $ssl_client_s_dn;
      proxy_set_header X-SSL-Fingerprint $ssl_client_fingerprint;
      proxy_set_header X-SSL-Serial $ssl_client_serial;
    }

    location /ws/ {
      set $back_upstream "back:8420";
      proxy_pass http://$back_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-SSL-Verify $ssl_client_verify;
      proxy_set_header X-SSL-Fingerprint $ssl_client_fingerprint;
    }

    location / {
      set $front_upstream "front:5180";
      proxy_pass http://$front_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
