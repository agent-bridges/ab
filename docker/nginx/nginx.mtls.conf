worker_processes auto;

events {
  worker_connections 1024;
}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /run/ab-tls/server.crt;
    ssl_certificate_key /run/ab-tls/server.key;
    ssl_client_certificate /run/ab-tls/browser-ca.crt;
    ssl_verify_client on;
    ssl_verify_depth 2;

    location /api/ {
      proxy_pass http://back:8420;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /ws/ {
      proxy_pass http://back:8420;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location / {
      proxy_pass http://front:5180;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  # Verifier port (see nginx.https.conf for rationale). Same in mtls mode so
  # the panel can still test the cert without depending on the main port's
  # config state.
  server {
    listen 5444 ssl;
    server_name _;

    ssl_certificate /run/ab-tls/server.crt;
    ssl_certificate_key /run/ab-tls/server.key;
    ssl_client_certificate /run/ab-tls/browser-ca.crt;
    ssl_verify_client optional;
    ssl_verify_depth 2;

    location /api/auth/client-cert/whoami {
      proxy_pass http://back:8420;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-SSL-Verify $ssl_client_verify;
      proxy_set_header X-SSL-Subject $ssl_client_s_dn;
      proxy_set_header X-SSL-Fingerprint $ssl_client_fingerprint;
      proxy_set_header X-SSL-Serial $ssl_client_serial;
    }

    location / { return 404; }
  }
}
