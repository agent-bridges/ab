services:
  agent-test-1:
    build:
      context: ./docker/agent-runtime
    image: agent-bridge-agent-runtime:test
    restart: unless-stopped
    volumes:
      - ${AB_WORKSPACE_PATH}:${AB_WORKSPACE_PATH}
      - ${AB_TEST_AGENT1_STATE_DIR}:/data
      - ${AB_TEST_AGENT1_JWT_SECRET_PATH}:/opt/agent-bridge/.jwt-secret:ro
    ports:
      - "${AB_TEST_AGENT1_PORT}:8421"
    environment:
      AB_PTY_RELEASE_REPO: agent-bridges/ab-pty
      AB_PTY_RELEASE_TAG: ${AB_IMAGE_TAG}
      AB_PTY_DOWNLOAD_TOKEN: ${AB_PTY_DOWNLOAD_TOKEN}
      AB_PTY_PORT: "8421"
      AB_PTY_DATABASE: /data/sessions.db

  agent-test-2:
    build:
      context: ./docker/agent-runtime
    image: agent-bridge-agent-runtime:test
    restart: unless-stopped
    volumes:
      - ${AB_WORKSPACE_PATH}:${AB_WORKSPACE_PATH}
      - ${AB_TEST_AGENT2_STATE_DIR}:/data
      - ${AB_TEST_AGENT2_JWT_SECRET_PATH}:/opt/agent-bridge/.jwt-secret:ro
    ports:
      - "${AB_TEST_AGENT2_PORT}:8421"
    environment:
      AB_PTY_RELEASE_REPO: agent-bridges/ab-pty
      AB_PTY_RELEASE_TAG: ${AB_IMAGE_TAG}
      AB_PTY_DOWNLOAD_TOKEN: ${AB_PTY_DOWNLOAD_TOKEN}
      AB_PTY_PORT: "8421"
      AB_PTY_DATABASE: /data/sessions.db
